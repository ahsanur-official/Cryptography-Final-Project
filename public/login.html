<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Crypto Chat</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-panel {
      border: 1px solid var(--line);
      background: var(--card);
      backdrop-filter: blur(22px);
      border-radius: 24px;
      padding: 48px 32px;
      box-shadow: var(--shadow);
      animation: slideIn 0.5s ease;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .login-header h1 {
      font-size: 1.8rem;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-header p {
      color: var(--muted);
      margin: 0;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--cyan);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 3px rgba(53, 208, 255, 0.1);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--cyan);
    }

    .forgot-password {
      color: var(--cyan);
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .forgot-password:hover {
      opacity: 0.8;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .form-actions button {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-login {
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      color: var(--bg-1);
      font-size: 0.95rem;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(53, 208, 255, 0.3);
    }

    .btn-clear {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border: 1px solid var(--line);
      font-size: 0.95rem;
    }

    .btn-clear:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .register-link {
      text-align: center;
    }

    .register-link p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .register-link a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .register-link a:hover {
      opacity: 0.8;
    }

    .security-badge {
      background: rgba(66, 225, 138, 0.12);
      border: 1px solid rgba(66, 225, 138, 0.3);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--green);
    }

    .security-badge strong {
      color: var(--green);
    }

    @media (max-width: 480px) {
      .login-panel {
        padding: 32px 20px;
      }

      .login-header h1 {
        font-size: 1.5rem;
      }

      .remember-forgot {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .form-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="login-wrapper">
    <div class="login-container">
      <div class="login-panel">
        <div class="login-header">
          <div class="login-logo">🔐</div>
          <h1>Welcome Back</h1>
          <p>Sign in to your Crypto Chat account</p>
        </div>

        <div class="info-banner" style="margin-bottom: 18px;">
          Sender and receiver usernames stay fixed after registration. Use Profile Settings after login to change a username.
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginUsername">Username</label>
            <input
              id="loginUsername"
              type="text"
              placeholder="Enter your username"
              required
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
              id="loginPassword"
              type="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </div>

          <div class="remember-forgot">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">Forgot password?</a>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-login">Sign In</button>
            <button type="button" class="btn-clear" onclick="clearLoginForm()">Clear</button>
          </div>
        </form>

        <div class="divider">OR</div>

        <div class="register-link">
          <p>Don't have an account? <a href="/register.html">Create one here</a></p>
        </div>

        <div class="security-badge">
          <strong>✓ End-to-End Encrypted</strong><br />
          Your password and messages are secure
        </div>
      </div>
    </div>
  </div>

  <script src="/navbar.js"></script>
  <script src="/main.js"></script>
  <script src="/login.js"></script>
</body>
</html>
