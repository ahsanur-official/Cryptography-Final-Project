<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - Crypto Chat</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <div class="chat-wrapper">
    <aside class="chat-sidebar">
      <div class="sidebar-header">
        <div>
          <div class="badge">Dashboard</div>
          <h3 id="identityLabel">Loading...</h3>
          <p class="chat-status" id="connectionStatus">Connecting...</p>
        </div>
      </div>

      <div class="conversation-panel">
        <div class="conversation-panel-title">Conversations</div>
        <div class="conversations-list" id="conversationsList"></div>
      </div>

      <div class="sidebar-footer">
        <button id="btnRefreshProofs" class="btn btn-secondary">Refresh proofs</button>
        <div class="proof-summary" id="proofSummary">No proofs yet.</div>
      </div>
    </aside>

    <main class="chat-main">
      <div class="chat-header">
        <div>
          <div class="eyebrow">Encrypted Chat</div>
          <h2 id="chatWithLabel">Select a conversation</h2>
          <p id="chatStatus" class="chat-status">Telegram-style messenger with encrypted payloads.</p>
        </div>
        <div class="header-actions">
          <button class="btn btn-soft" id="btnLogout">Logout</button>
        </div>
      </div>

      <div class="chat-messages" id="messages">
        <div class="empty-state">Choose a conversation or type a recipient to begin.</div>
      </div>

      <div class="chat-input-area">
        <div class="form-group">
          <label for="toUsername" class="sr-only">Recipient username</label>
          <input id="toUsername" class="message-input" placeholder="Recipient username (e.g. bob_receiver)" autocomplete="off" />
        </div>
        <div class="message-input-group">
          <textarea id="message" class="message-textarea" placeholder="Type your secure message here..." rows="3"></textarea>
          <button type="button" class="btn btn-primary btn-send" id="btnSend">Send</button>
        </div>
      </div>
    </main>
  </div>

  <style>
    .chat-wrapper {
      display: grid;
      grid-template-columns: 0.95fr 1.35fr;
      gap: 24px;
      padding: 24px;
      min-height: calc(100vh - 70px);
    }

    .conversation-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 12px;
    }

    .conversation-panel-title {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .message-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-size: 0.95rem;
    }

    .message-input:focus {
      border-color: rgba(53, 208, 255, 0.7);
      box-shadow: 0 0 0 4px rgba(53, 208, 255, 0.12);
    }

    .proof-summary {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      min-height: 4.2rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1024px) {
      .chat-wrapper {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .chat-wrapper {
        padding: 16px;
        gap: 16px;
      }
    }
  </style>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="/navbar.js"></script>
  <script type="module" src="/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const navbarContainer = document.getElementById('navbar-container');
      const navbarResponse = await fetch('/navbar.html');
      navbarContainer.innerHTML = await navbarResponse.text();
      initializeNavbar();
      
      const auth = JSON.parse(localStorage.getItem('auth_session') || 'null');
      if (!auth || !auth.token) {
        window.location.href = '/';
        return;
      }
      
      await initializeSession(auth);

    });
  </script>
</body>
</html>
