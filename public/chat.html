<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - Crypto Chat</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <!-- Hidden shell required by main.js to avoid null-reference crashes on this page -->
  <div id="workspace" hidden>
    <div id="authPanel" hidden>
      <button id="btnRegister" type="button"></button>
      <button id="btnLogin" type="button"></button>
    </div>
    <div id="messages"></div>
    <div id="proofSummary"></div>
    <button id="btnRefreshProofs" type="button"></button>
  </div>

  <div class="chat-wrapper">
    <aside class="chat-sidebar">
      <div class="sidebar-header">
        <h3 id="identityLabel">Demo Controls</h3>
        <div class="status-pill status-green" id="connectionStatus">Demo</div>
      </div>
      <div class="conversations-list" id="demoControls">
        <div class="stack" style="padding:12px;">
          <label>Party A username
            <input id="demoAUsername" value="alice" readonly />
          </label>
          <label>Party B username
            <input id="demoBUsername" value="bob" readonly />
          </label>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button id="btnAutoRegister" class="btn">Auto Register Both</button>
            <button id="btnAutoLoginBoth" class="btn btn-primary">Auto Login Both</button>
          </div>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button id="btnClearKeys" class="btn btn-soft">Clear Keys</button>
            <button id="btnOpenTwoParty" class="btn">Open Demo</button>
          </div>
          <div style="margin-top:12px;" class="small">Use these controls to quickly prepare the two-party demo. On mobile, panels will stack for readability.</div>
        </div>
      </div>
      <div class="sidebar-footer">
        <a href="/proofs.html" class="proof-link-small">📊 Proofs</a>
      </div>
    </aside>

    <div class="chat-main">
      <div class="chat-header">
        <div>
          <h2 id="chatWithLabel">Select a conversation</h2>
          <p id="chatStatus" class="chat-status">Encrypted with AES-GCM + RSA-PSS</p>
        </div>
        <div class="status-pill status-blue">Secure</div>
        <button id="toggleTwoParty" class="btn btn-soft" style="margin-left:12px;">Two-Party Demo</button>
      </div>

      <!-- Integrated Two-Party Panels -->
      <div class="two-panel" style="grid-template-columns: 1fr 1fr; gap:16px; padding:12px;">
        <section class="panel" id="panelA">
          <h3>Party A</h3>
          <div class="controls">
            <input id="aUsername" placeholder="username (e.g. alice)" readonly />
            <input id="aPassword" type="password" placeholder="password" />
            <div style="display:flex; gap:8px;">
              <button id="aRegister" class="btn">Register</button>
              <button id="aLogin" class="btn btn-primary">Login</button>
              <button id="aLogout" class="btn btn-soft">Logout</button>
                <button id="aSettings" class="btn btn-soft">Settings</button>
            </div>
            <div class="small" id="aStatus">Not logged in</div>
          </div>

          <div class="messages" id="aMessages" style="height:360px; overflow:auto; margin-top:12px;"></div>

          <div class="send-row">
            <input id="aTo" placeholder="Recipient username" style="flex:1;" />
            <input id="aText" placeholder="Message" style="flex:2;" />
            <button id="aSend" class="btn btn-primary">Send</button>
          </div>
        </section>

        <section class="panel" id="panelB">
          <h3>Party B</h3>
          <div class="controls">
            <input id="bUsername" placeholder="username (e.g. bob)" readonly />
            <input id="bPassword" type="password" placeholder="password" />
            <div style="display:flex; gap:8px;">
              <button id="bRegister" class="btn">Register</button>
              <button id="bLogin" class="btn btn-primary">Login</button>
              <button id="bLogout" class="btn btn-soft">Logout</button>
                <button id="bSettings" class="btn btn-soft">Settings</button>
            </div>
            <div class="small" id="bStatus">Not logged in</div>
          </div>

          <div class="messages" id="bMessages" style="height:360px; overflow:auto; margin-top:12px;"></div>

          <div class="send-row">
            <input id="bTo" placeholder="Recipient username" style="flex:1;" />
            <input id="bText" placeholder="Message" style="flex:2;" />
            <button id="bSend" class="btn btn-primary">Send</button>
          </div>
        </section>
      </div>

      <script src="/two-party.js"></script>
    </div>
  </div>

  <style>
    .chat-wrapper {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 20px;
      padding: 20px;
      min-height: calc(100vh - 70px);
      background: var(--bg-2);
    }

    @media (max-width: 1024px) {
      .chat-wrapper {
        grid-template-columns: 1fr;
      }

      .chat-sidebar {
        max-height: 300px;
      }
    }

    @media (max-width: 760px) {
      .chat-wrapper {
        padding: 12px;
        gap: 12px;
      }
    }
  </style>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="/navbar.js"></script>
  <script type="module" src="/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const navbarContainer = document.getElementById('navbar-container');
      const navbarResponse = await fetch('/navbar.html');
      navbarContainer.innerHTML = await navbarResponse.text();
      initializeNavbar();
      
      const auth = JSON.parse(localStorage.getItem('auth_session') || 'null');
      if (!auth || !auth.token) {
        window.location.href = '/';
        return;
      }
      
      await initializeSession(auth);

    });
  </script>
</body>
</html>
